<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Header</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; }

    .rb-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(228, 71, 67, 0.3);
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
    }

    .rb-header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 20px;
    }

    .rb-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rb-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
    }

    .rb-logo-img {
      width: 140px;
      height: 50px;
      background: url('/assets/images/logo.png') no-repeat center/contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .rb-logo-text {
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, #e44743, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .rb-main-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
    }

    .rb-nav-item {
      position: relative;
    }

    .rb-nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 8px;
      transition: all 0.2s ease;
      white-space: nowrap;
      cursor: pointer;
    }

    .rb-nav-link:hover {
      background: rgba(228, 71, 67, 0.15);
      color: #fff;
    }

    .rb-nav-link.active {
      background: rgba(228, 71, 67, 0.2);
      color: #e44743;
    }

    .rb-nav-icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
    }

    .rb-dropdown-arrow {
      width: 12px;
      height: 12px;
      transition: transform 0.2s ease;
      opacity: 0.6;
    }

    .rb-nav-item:hover .rb-dropdown-arrow {
      transform: rotate(180deg);
      opacity: 1;
    }

    .rb-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      min-width: 220px;
      background: rgba(20, 20, 20, 0.98);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(228, 71, 67, 0.2);
      border-radius: 12px;
      padding: 8px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.2s ease;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      list-style: none;
    }

    .rb-nav-item:hover .rb-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .rb-dropdown-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      color: #ccc;
      text-decoration: none;
      font-size: 0.85rem;
      border-radius: 8px;
      transition: all 0.15s ease;
    }

    .rb-dropdown-link:hover {
      background: rgba(228, 71, 67, 0.15);
      color: #fff;
    }

    .rb-dropdown-icon {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }

    .rb-header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rb-lang-selector {
      position: relative;
    }

    .rb-lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .rb-lang-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(228, 71, 67, 0.3);
    }

    .rb-lang-flag {
      width: 20px;
      height: 14px;
      border-radius: 2px;
      object-fit: cover;
    }

    .rb-lang-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 150px;
      background: rgba(20, 20, 20, 0.98);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(228, 71, 67, 0.2);
      border-radius: 8px;
      padding: 6px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.2s ease;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      list-style: none;
    }

    .rb-lang-selector:hover .rb-lang-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .rb-lang-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      color: #ccc;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s ease;
      text-decoration: none;
    }

    .rb-lang-option:hover {
      background: rgba(228, 71, 67, 0.15);
      color: #fff;
    }

    .rb-header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rb-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .rb-btn-primary {
      background: linear-gradient(135deg, #e44743, #c73e3a);
      color: #fff;
      box-shadow: 0 4px 15px rgba(228, 71, 67, 0.4);
    }

    .rb-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(228, 71, 67, 0.5);
    }

    .rb-btn-secondary {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .rb-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .rb-mobile-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: 8px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .rb-mobile-toggle span {
      width: 24px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    @media (max-width: 1024px) {
      .rb-main-nav {
        display: none;
      }

      .rb-mobile-toggle {
        display: flex;
      }

      .rb-header-right {
        gap: 8px;
      }

      .rb-btn {
        padding: 8px 14px;
        font-size: 0.85rem;
      }
    }

    @media (max-width: 640px) {
      .rb-header-inner {
        height: 60px;
        padding: 0 12px;
      }

      .rb-logo-img {
        width: 100px;
        height: 36px;
      }

      .rb-logo-text {
        font-size: 1.2rem;
      }

      .rb-lang-btn {
        padding: 6px 8px;
        font-size: 0.8rem;
      }

      .rb-lang-flag {
        width: 18px;
        height: 12px;
      }

      .rb-btn {
        padding: 6px 12px;
        font-size: 0.8rem;
      }

      .rb-header-actions {
        gap: 6px;
      }
    }
  </style>
</head>
<body>

            <li class="rb-nav-item">
              <a href="/point_system" class="rb-nav-link">

            </li>
          </ul>
        </nav>
      </div>

      <div class="rb-header-right">
        <div class="rb-lang-selector">
          <button class="rb-lang-btn">
            <img src="/assets/images/he.svg" alt="Hebrew" class="rb-lang-flag">

          </button>
          <ul class="rb-lang-dropdown">
            <li>
              <a href="#" class="rb-lang-option" data-lang="he">
                <img src="/assets/images/he.svg" alt="Hebrew" class="rb-lang-flag">
                <span>עברית</span>
              </a>
            </li>
            <li>
              <a href="#" class="rb-lang-option" data-lang="en">
                <img src="/assets/images/en.svg" alt="English" class="rb-lang-flag">

        </div>

        <div class="rb-header-actions">
          <a href="/account/login" class="rb-btn rb-btn-secondary">התחברות</a>
          <a href="/account/register" class="rb-btn rb-btn-primary">הרשמה</a>
        </div>

        <button class="rb-mobile-toggle" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <script>
    // Mobile menu toggle
    document.querySelector('.rb-mobile-toggle').addEventListener('click', function() {
      this.classList.toggle('active');
      const nav = document.querySelector('.rb-main-nav');
      if (nav.style.display === 'block') {
        nav.style.display = 'none';
      } else {
        nav.style.display = 'block';
        nav.style.position = 'absolute';
        nav.style.top = '70px';
        nav.style.left = '0';
        nav.style.right = '0';
        nav.style.background = 'rgba(10,10,10,0.98)';
        nav.style.padding = '20px';
        nav.style.flexDirection = 'column';
      }
    });

    // Language selector
    document.querySelectorAll('.rb-lang-option').forEach(option => {
      option.addEventListener('click', function(e) {
        e.preventDefault();
        const lang = this.dataset.lang;
        // Implement language switch logic here
        console.log('Language selected:', lang);
      });
    });
  </script>
</body>
</html>
